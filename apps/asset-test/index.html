<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axinite Assets Test</title>
    <style>
        body { margin: 0; background: #222; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 1rem; background: #333; }
        main { flex: 1; display: flex; gap: 1rem; padding: 1rem; flex-wrap: wrap; }
        .test-card { border: 1px solid #444; background: #2a2a2a; border-radius: 8px; padding: 1rem; width: 300px; display: flex; flex-direction: column; }
        .status { margin-top: auto; padding: 0.5rem; border-radius: 4px; text-align: center; }
        .pending { background: #555; }
        .success { background: #2e7d32; }
        .error { background: #c62828; }
        canvas { border: 1px solid #555; background: #000; width: 100%; height: 150px; }
        button { margin-top: 0.5rem; padding: 0.5rem; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <h1>Axinite Assets Test</h1>
    </header>
    <main>
        <div id="font-test" class="test-card">
            <h2>Font Loader (.ttf)</h2>
            <p>Generates MSDF atlas from TTF</p>
            <canvas id="font-canvas"></canvas>
            <div id="font-status" class="status pending">Waiting...</div>
        </div>

        <div id="gltf-test" class="test-card">
            <h2>GLTF Loader (.glb)</h2>
            <p>Loads GLTF in worker</p>
            <div id="gltf-info">Info will appear here...</div>
            <div id="gltf-status" class="status pending">Waiting...</div>
        </div>

        <div id="audio-test" class="test-card">
            <h2>Audio Loader (.mp3)</h2>
            <p>Loads raw audio buffer into SAB</p>
            <div id="audio-info">Info will appear here...</div>
            <button id="play-audio" type="button" disabled>Play Audio</button>
            <div id="audio-status" class="status pending">Waiting...</div>
        </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
